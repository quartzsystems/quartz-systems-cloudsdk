name: Build packages

# Build the .deb and .rpm on every push / PR, and attach them to a GitHub
# Release when a v* tag is pushed. Both jobs reuse the repo's container build
# scripts (build-deb.sh / build-rpm.sh), which export the Next.js frontend,
# compile the Rust backend, and drop the artifact in dist/. The GitHub-hosted
# ubuntu runners ship Docker, so the scripts run unmodified.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # needed by the release job; harmless for the build jobs

jobs:
  deb:
    name: Build .deb (Debian)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .deb
        run: bash build-deb.sh

      # The container runs as root, so dist/ is root-owned; hand it back to the
      # runner user before uploading.
      - name: Fix artifact ownership
        run: sudo chown -R "$USER:$USER" dist

      - uses: actions/upload-artifact@v4
        with:
          name: deb
          path: dist/*.deb
          if-no-files-found: error

  rpm:
    name: Build .rpm (Fedora)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .rpm
        run: bash build-rpm.sh

      - name: Fix artifact ownership
        run: sudo chown -R "$USER:$USER" dist

      - uses: actions/upload-artifact@v4
        with:
          name: rpm
          path: dist/*.rpm
          if-no-files-found: error

  release:
    name: Attach packages to release
    needs: [deb, rpm]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
